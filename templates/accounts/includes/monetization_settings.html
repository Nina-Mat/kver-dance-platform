{% comment %}
Заглушка монетизации: переключатель «Купить продвижение» (disabled).
Показывается только владельцу профиля.
{% endcomment %}
{% if is_owner %}
<h6 class="profile-section-title">Монетизация</h6>
<div class="monetization-stub mb-4">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-3">
        <div>
            <strong class="text-light">Купить продвижение</strong>
            <p class="text-muted small mb-0">Поднимите профиль в рекомендациях ленты</p>
        </div>
        <div class="form-check form-switch mb-0 kver-action-tooltip"
             title="Платное продвижение профиля в рекомендациях — функция скоро будет доступна">
            <input class="form-check-input" type="checkbox" role="switch"
                   id="promotionToggle{% if profile_user %}{{ profile_user.pk }}{% elif team %}{{ team.pk }}{% endif %}"
                   disabled>
            <label class="form-check-label text-muted small"
                   for="promotionToggle{% if profile_user %}{{ profile_user.pk }}{% elif team %}{{ team.pk }}{% endif %}">
                Скоро
            </label>
        </div>
    </div>
    <small class="text-muted d-block mt-2">
        <i class="bi bi-info-circle"></i> Визуальная заглушка — оплата не подключена
    </small>
</div>
{% endif %}
